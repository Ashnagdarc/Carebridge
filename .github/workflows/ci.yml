name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security Audit (Critical Only)
        run: npm run security:audit

      - name: Unit Tests
        run: npm test

      - name: Install Playwright (Chromium)
        working-directory: packages/patient-pwa
        run: npx playwright install --with-deps chromium

      - name: PWA E2E Tests (Playwright)
        working-directory: packages/patient-pwa
        run: npm run test:e2e
